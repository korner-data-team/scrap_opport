name: Scheduled Booking Scraper

on:
  schedule:
    - cron: '0 3 * * *'  # Daily at 3:00 UTC
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    timeout-minutes: 33  # safety net — kills the job if it hangs

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4  # bumped from v3 (Node 20 deprecation)

      - name: Set up Python 3.11
        uses: actions/setup-python@v5  # bumped from v4 (Node 20 deprecation)
        with:
          python-version: 3.11

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3-dev python3-pip xvfb
          # xvfb = virtual display for the (non-headless) Chrome browser

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup Chrome for Selenium
        uses: browser-actions/setup-chrome@v1

      - name: Create Google Services JSON File
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > google-services.json

      - name: Check JSON validity
        run: |
          python -c "import json; json.load(open('google-services.json'))"

      - name: Run scraper script
        env:
          GOOGLE_APPLICATION_CREDENTIALS: google-services.json
        run: xvfb-run -a python scraper_opportunities.py
        # xvfb-run wraps the script in a virtual display so non-headless
        # Chrome thinks it has a screen to render on.
